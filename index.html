<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول</title>
  <style>
    body {font-family: 'Segoe UI', sans-serif; background:#f4f6f9; text-align:center;}
    .container {margin:200px auto; width:200px; background:#fff; padding:70px; border-radius:8px; box-shadow:0 0 40px rgba(0,0,0,0.1);}
    input, button {width:90%; padding:10px; margin:10px 0;}
    button {background:#4a90e2; color:#fff; border:none; border-radius:5px;}
    button:hover {background:#357ab8;}
  </style>
</head>
<body>
  <div class="container">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button onclick="login()">دخول</button>
  </div>
  <script>
    function login(){
      const user=document.getElementById("username").value;
      const pass=document.getElementById("password").value;
      if(user==="Frah" && pass==="0000"){
        alert("تم تسجيل الدخول بنجاح");
        window.location.href="profile.html";
      } else {
        alert("بيانات غير صحيحة");
      }
    }
  </script>
</body>
</html>
